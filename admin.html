<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المشرف - صرّاف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #1a2a3a;
            --gold: #d4af37;
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #1a1a1a;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body.dark {
            --bg: #121a24;
            --card: #1e2a36;
            --text: #eef2ff;
        }
        .container { max-width: 750px; width:100%; }
        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid rgba(212,175,55,0.15);
        }
        .flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:12px; }
        h2 { color: var(--gold); }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-family: inherit;
            background: white;
            margin-bottom: 12px;
        }
        body.dark input, body.dark select {
            background: #0f1a24;
            border-color: #3a4a5a;
            color: white;
        }
        button {
            background: var(--gold);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition:0.2s;
            font-family: inherit;
        }
        button:hover { transform: scale(1.02); }
        .btn-danger { background: #c0392b; color:white; }
        .btn-secondary { background: #2c3e50; color:white; }
        .ad-item {
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        body.dark .ad-item { background: rgba(255,255,255,0.04); }
        .footer { margin-top:30px; text-align:center; font-size:0.8rem; color:#888; }
        .toast {
            position: fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background: var(--gold); padding:12px 24px; border-radius:50px;
            font-weight:700; display:none; z-index:999;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="flex">
            <h2><i class="fas fa-crown"></i> لوحة المشرف - صرّاف</h2>
            <div>
                <button id="themeToggle"><i class="fas fa-moon"></i></button>
                <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <hr style="margin:20px 0; border-color:rgba(212,175,55,0.2);">

        <h3>💰 أسعار الصرف والذهب</h3>
        <input type="number" id="usd_syr_buy" placeholder="شراء دولار/سوري" step="0.01">
        <input type="number" id="usd_syr_sell" placeholder="بيع دولار/سوري" step="0.01">
        <input type="number" id="usd_try_buy" placeholder="شراء دولار/تركي" step="0.01">
        <input type="number" id="usd_try_sell" placeholder="بيع دولار/تركي" step="0.01">
        <input type="number" id="gold_usd_ounce" placeholder="سعر الأونصة بالدولار" step="0.01">
        <button id="saveRatesBtn"><i class="fas fa-save"></i> حفظ الأسعار</button>
        <div id="ratesMsg" style="margin-top:10px; color:green; display:none;">✅ تم الحفظ</div>
    </div>

    <div class="card">
        <h3>📢 إدارة الإعلانات</h3>
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
            <select id="adsEnabledSelect">
                <option value="true">مفعلة</option>
                <option value="false">معطلة</option>
            </select>
            <button id="saveAdsEnabledBtn">حفظ الحالة</button>
        </div>
        <div id="adsList"></div>
        <input type="text" id="newAdImage" placeholder="رابط الصورة">
        <input type="text" id="newAdText" placeholder="نص الإعلان">
        <input type="text" id="newAdLink" placeholder="رابط الوجهة">
        <button id="addAdBtn"><i class="fas fa-plus"></i> إضافة إعلان</button>
    </div>
</div>
<div id="toast" class="toast"></div>
<footer class="footer">تم التصميم بواسطة أحمد كلاوي</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5I0tSk73Iue1WaU3Jx_Q1LuwnFA2yrTo",
        authDomain: "ahmad-1a32b.firebaseapp.com",
        projectId: "ahmad-1a32b",
        storageBucket: "ahmad-1a32b.firebasestorage.app",
        messagingSenderId: "585031300322",
        appId: "1:585031300322:web:d0af3e433e4ca3bf975abb"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, user => { if (!user) window.location.href = "login.html"; });

    const ratesRef = ref(db, 'rates');
    const adsRef = ref(db, 'adsArray');
    const adsEnabledRef = ref(db, 'adsEnabled');

    // Load rates
    onValue(ratesRef, snap => {
        if (snap.exists()) {
            const d = snap.val();
            document.getElementById('usd_syr_buy').value = d.usd_syr_buy || 13200;
            document.getElementById('usd_syr_sell').value = d.usd_syr_sell || 13100;
            document.getElementById('usd_try_buy').value = d.usd_try_buy || 47.15;
            document.getElementById('usd_try_sell').value = d.usd_try_sell || 46.50;
            document.getElementById('gold_usd_ounce').value = d.gold_usd_ounce || 4016.47;
        }
    });

    document.getElementById('saveRatesBtn').addEventListener('click', async () => {
        const data = {
            usd_syr_buy: parseFloat(document.getElementById('usd_syr_buy').value) || 13200,
            usd_syr_sell: parseFloat(document.getElementById('usd_syr_sell').value) || 13100,
            usd_try_buy: parseFloat(document.getElementById('usd_try_buy').value) || 47.15,
            usd_try_sell: parseFloat(document.getElementById('usd_try_sell').value) || 46.50,
            gold_usd_ounce: parseFloat(document.getElementById('gold_usd_ounce').value) || 4016.47,
            last_update: new Date().toISOString()
        };
        await update(ratesRef, data);
        const msg = document.getElementById('ratesMsg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    });

    // Ads
    let adsArray = [];
    function renderAds() {
        const container = document.getElementById('adsList');
        if (!adsArray.length) { container.innerHTML = '<p style="color:#888;">لا توجد إعلانات</p>'; return; }
        container.innerHTML = adsArray.map((ad, i) => `
            <div class="ad-item">
                <div>
                    <div>🖼️ ${ad.imageUrl || 'بدون صورة'}</div>
                    <div>📝 ${ad.text || ''}</div>
                    <div>🔗 ${ad.link || ''}</div>
                </div>
                <button class="btn-danger" data-index="${i}"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
        document.querySelectorAll('.ad-item .btn-danger').forEach(btn => {
            btn.addEventListener('click', async () => {
                const idx = parseInt(btn.dataset.index);
                adsArray.splice(idx, 1);
                await set(adsRef, adsArray);
                renderAds();
                showToast('🗑️ تم حذف الإعلان');
            });
        });
    }

    onValue(adsRef, snap => {
        if (snap.exists() && Array.isArray(snap.val())) adsArray = snap.val();
        else adsArray = [];
        renderAds();
    });

    onValue(adsEnabledRef, snap => {
        document.getElementById('adsEnabledSelect').value = snap.val() === true ? 'true' : 'false';
    });

    document.getElementById('saveAdsEnabledBtn').addEventListener('click', async () => {
        const val = document.getElementById('adsEnabledSelect').value === 'true';
        await set(adsEnabledRef, val);
        showToast('✅ تم تحديث حالة الإعلانات');
    });

    document.getElementById('addAdBtn').addEventListener('click', async () => {
        const imageUrl = document.getElementById('newAdImage').value.trim();
        const text = document.getElementById('newAdText').value.trim();
        const link = document.getElementById('newAdLink').value.trim();
        if (!imageUrl && !text) { showToast('⚠️ أضف صورة أو نص'); return; }
        adsArray.push({ imageUrl, text, link });
        await set(adsRef, adsArray);
        document.getElementById('newAdImage').value = '';
        document.getElementById('newAdText').value = '';
        document.getElementById('newAdLink').value = '';
        renderAds();
        showToast('✅ تم إضافة الإعلان');
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = "login.html"));

    // Theme
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        themeToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });
    if (document.body.classList.contains('dark')) themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
</script>
</body>
</html>
