<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة المشرف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #1e3c72;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            transition: 0.2s;
        }
        input:focus {
            border-color: #2a5298;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #0f2b4f;
        }
        .error {
            margin-top: 15px;
            padding: 8px;
            border-radius: 50px;
            font-size: 14px;
            background: #ffebee;
            color: #d32f2f;
            text-align: center;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #ddd;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🔐 لوحة المشرف</h2>
    <div class="input-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="admin@example.com">
    </div>
    <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button id="loginBtn">تسجيل الدخول</button>
    <div id="errorMsg" class="error" style="display: none;"></div>
</div>
<div class="footer">
    تم التصميم بواسطة أحمد كلاوي<br>
    Designed by Ahmed Klawi
</div>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyD5I0tSk73Iue1WaU3Jx_Q1LuwnFA2yrTo",
        authDomain: "ahmad-1a32b.firebaseapp.com",
        projectId: "ahmad-1a32b",
        storageBucket: "ahmad-1a32b.firebasestorage.app",
        messagingSenderId: "585031300322",
        appId: "1:585031300322:web:d0af3e433e4ca3bf975abb",
        measurementId: "G-C0GFV8C96P"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const errorDiv = document.getElementById('errorMsg');

    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) {
            showError("❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور.");
            return;
        }
        setPersistence(auth, browserSessionPersistence)
            .then(() => signInWithEmailAndPassword(auth, email, password))
            .then(() => { window.location.href = "admin.html"; })
            .catch(() => { showError("❌ البريد الإلكتروني أو كلمة المرور غير صحيحة."); });
    });
</script>
</body>

</html>
